name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. 0.2.0). Pushed as ghcr.io/<owner>/review-agent:<tag>."
        required: true

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: build + scan + push
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$DISPATCH_TAG" ]; then
            printf 'version=%s\n' "$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          else
            printf 'version=%s\n' "${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: |
            review-agent:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/review-agent:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/review-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Spec §15.6.6: Trivy must scan and block release on HIGH/CRITICAL.
      - name: Trivy CVE scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: review-agent:${{ steps.ver.outputs.version }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table
          vuln-type: os,library

      - name: Trivy SARIF
        if: always()
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: review-agent:${{ steps.ver.outputs.version }}
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Push image
        if: success()
        env:
          IMAGE_TAG: ${{ steps.ver.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          docker push "ghcr.io/${OWNER}/review-agent:${IMAGE_TAG}"
          docker push "ghcr.io/${OWNER}/review-agent:latest"

      # cosign keyless OIDC signing — spec §15.6.3.
      - uses: sigstore/cosign-installer@v3
        if: success()

      - name: Sign image
        if: success()
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_TAG: ${{ steps.ver.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          cosign sign --yes \
            "ghcr.io/${OWNER}/review-agent:${IMAGE_TAG}"

      # SBOM — spec §15.6.2.
      - uses: anchore/sbom-action@v0
        if: success()
        with:
          image: ghcr.io/${{ github.repository_owner }}/review-agent:${{ steps.ver.outputs.version }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Attach SBOM to release
        if: github.event_name == 'release' && success()
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.cyclonedx.json
