name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      # `pnpm typecheck` (`tsc --noEmit`) resolves `@review-agent/*` workspace
      # deps via each package's `package.json` `"types"` field, which points at
      # `./dist/*.d.ts`. On a fresh checkout there is no `dist/`, so dependents
      # fail with TS2307 unless we build the producers first.
      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: packages/*/coverage
          if-no-files-found: ignore
          retention-days: 7
