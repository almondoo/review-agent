name: self-review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: self-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ github.event.pull_request.draft == false }}
    name: review-agent dogfood
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r --filter './packages/**' build

      - name: Run review-agent
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        uses: ./packages/action
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          language: en-US
          config-path: .review-agent.yml
          cost-cap-usd: '0.50'

      - name: Skip notice
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: echo "ANTHROPIC_API_KEY not set - skipping review-agent dogfood. Add the secret in repo settings to enable per-PR self-review."
