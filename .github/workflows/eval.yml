name: eval

on:
  pull_request:
    paths:
      - 'packages/runner/**'
      - 'packages/core/**'
      - 'packages/eval/**'
      - '.github/workflows/eval.yml'

permissions:
  contents: read

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate fixture shapes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @review-agent/eval validate:severity-consistency
      - run: pnpm --filter @review-agent/eval test

  promptfoo:
    if: ${{ github.event.pull_request.draft == false }}
    name: promptfoo regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run promptfoo eval
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: pnpm --filter @review-agent/eval eval

      - name: Run severity-consistency eval (3 runs/fixture)
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: pnpm --filter @review-agent/eval eval:severity-consistency

      # Translate promptfoo output JSON into the per-fixture scoring
      # input shape the gate consumes (#83 Phase 1 / #90). The shim
      # runs every CI execution that has an API key; the previous
      # hashFiles gate is removed because the shim is the producer.
      - name: Shape promptfoo output into scoring input
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        working-directory: packages/eval
        run: pnpm shim:severity-input -- --in severity-consistency-results.json --out severity-consistency-input.json

      # Gate severity_consistency_score against baseline (5pp drop max).
      # With `severity_consistency_score: null` in baseline.json the
      # gate is informational - checkGate returns ok and the current
      # score is reported in stdout for the operator to copy into
      # baseline.json on the first measurement.
      - name: Gate severity_consistency_score against baseline
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: pnpm --filter @review-agent/eval score:severity-consistency -- --results severity-consistency-input.json --max-drop-pp 5

      # #101: LLM-as-a-Judge auto-grader. Informational only -- the
      # step is allowed to fail without blocking merge while we collect
      # calibration data. Promotion to enforcing happens in a follow-up
      # PR (see docs/eval/llm-as-judge.md).
      - name: Run LLM-as-a-Judge (informational)
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        continue-on-error: true
        working-directory: packages/eval
        run: pnpm judge -- --candidate-results severity-consistency-input.json --judge-provider anthropic --judge-model claude-opus-4-7

      - name: Skip notice
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: echo "ANTHROPIC_API_KEY not set - skipping promptfoo eval. Add the secret to enable regression gating."

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: promptfoo-results
          path: |
            packages/eval/.promptfoo
            packages/eval/severity-consistency-results.json
          if-no-files-found: ignore
          retention-days: 14
