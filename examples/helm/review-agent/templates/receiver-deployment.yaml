apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "review-agent.fullname" . }}-receiver
  labels:
    {{- include "review-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: receiver
spec:
  replicas: {{ .Values.receiver.replicas }}
  selector:
    matchLabels:
      {{- include "review-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: receiver
  template:
    metadata:
      labels:
        {{- include "review-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: receiver
      {{- with .Values.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "review-agent.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: receiver
          image: {{ include "review-agent.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["node", "/app/packages/server/dist/serverless.js"]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "review-agent.fullname" . }}-config
            - secretRef:
                name: {{ .Values.secrets.existingSecret | quote }}
          resources: {{- toYaml .Values.receiver.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
