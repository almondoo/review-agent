{{- if .Values.receiver.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "review-agent.fullname" . }}-receiver
  labels:
    {{- include "review-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: receiver
  {{- with .Values.receiver.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.receiver.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.receiver.ingress.tls }}
  tls: {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.receiver.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "review-agent.fullname" $ }}-receiver
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
