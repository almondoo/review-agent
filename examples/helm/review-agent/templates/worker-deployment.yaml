apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "review-agent.fullname" . }}-worker
  labels:
    {{- include "review-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  # KEDA owns replicas when enabled. We seed 0 here so the chart
  # produces the right initial state on first install.
  replicas: 0
  selector:
    matchLabels:
      {{- include "review-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "review-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      {{- with .Values.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "review-agent.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "review-agent.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["node", "/app/packages/server/dist/serverless.js"]
          envFrom:
            - configMapRef:
                name: {{ include "review-agent.fullname" . }}-config
            - secretRef:
                name: {{ .Values.secrets.existingSecret | quote }}
          resources: {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
