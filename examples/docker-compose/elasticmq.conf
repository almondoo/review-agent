// ElasticMQ — local SQS-compatible queue for the docker-compose
// stack. One main queue + DLQ. The queue parameters mirror the AWS
// example's SQS pair so a deployment migrating from compose to AWS
// behaves identically.
include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

queues {
  review-agent-jobs {
    defaultVisibilityTimeout = 600 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
    deadLettersQueue {
      name = "review-agent-jobs-dlq"
      maxReceiveCount = 5
    }
  }
  review-agent-jobs-dlq {
    defaultVisibilityTimeout = 0 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
}
