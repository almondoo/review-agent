name: review-agent
description: AI code review for GitHub PRs. Posts inline comments and a summary using your own LLM API key.
author: almondoo

branding:
  icon: check-circle
  color: blue

inputs:
  github-token:
    description: GitHub token for posting comments. Defaults to `secrets.GITHUB_TOKEN`.
    required: false
    default: ${{ github.token }}
  anthropic-api-key:
    description: Anthropic API key (BYOK). Required for the default Anthropic provider.
    required: false
  language:
    description: Output language for review comments (ISO 639-1 + region). Defaults to en-US.
    required: false
    default: en-US
  config-path:
    description: Path to .review-agent.yml inside the repository. Defaults to .review-agent.yml.
    required: false
    default: .review-agent.yml
  cost-cap-usd:
    description: Per-PR cost cap in USD. Defaults to 1.0.
    required: false
    default: '1.0'
  state-write-retries:
    description: >-
      Number of retries (on top of the first attempt) for the hidden state-comment write
      and the inline-review write. On transient failures (HTTP 429 or 5xx) the action retries
      with exponential backoff (1s, 3s, 9s). Other 4xx errors are not retried. If the budget is
      exhausted the action fails so the operator notices. Range 0-5; default 3 (i.e. up to 4
      total attempts). Set 0 for fail-fast (a single attempt with no retry).
    required: false
    default: '3'

outputs:
  posted-comments:
    description: Number of inline comments posted in this run.
  cost-usd:
    description: USD cost of this review.

runs:
  using: node24
  main: dist/index.js
