# review-agent bundled preset: strict
#
# Tighter settings for release branches, security-sensitive projects, or
# teams that prefer exhaustive review coverage. Posts on major+ findings
# in all categories and requests changes on major+ (not just critical).
#
# Override semantics (documented):
#   - Scalar values: your config wins (last wins).
#   - Object keys: deep-merged (your keys override matching preset keys;
#     unmatched preset keys are preserved).
#   - Arrays: REPLACED entirely by your config (not appended).

reviews:
  auto_review:
    enabled: true
    drafts: true
  path_filters:
    - "!dist/**"
    - "!build/**"
    - "!coverage/**"
    - "!**/*.lock"
    - "!**/*.generated.*"
    - "!**/__snapshots__/**"
    - "!**/*.min.js"
    - "!**/*.min.css"
  max_files: 100
  max_diff_lines: 5000
  ignore_authors:
    - "dependabot[bot]"
    - "renovate[bot]"
    - "github-actions[bot]"
  min_confidence: low
  request_changes_on: major
  max_steps: 30

cost:
  max_usd_per_pr: 2.0
  hard_stop: true
  daily_cap_usd: 100.0

ruleset:
  bug:
    enabled: true
    min_severity: info
  security:
    enabled: true
    min_severity: info
  performance:
    enabled: true
    min_severity: minor
  maintainability:
    enabled: true
    min_severity: minor
  style:
    enabled: true
    min_severity: minor
  docs:
    enabled: true
    min_severity: info
  test:
    enabled: true
    min_severity: info
